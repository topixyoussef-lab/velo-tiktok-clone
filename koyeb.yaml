name: velo
service:
  port: 3000
  routes:
    - path: /
  env:
    - key: DATA_DIR
      value: /data
    - key: NODE_ENV
      value: production
  health:
    path: /api/health
    interval: 15
    timeout: 5
    initial_delay: 30
  volumes:
    - path: /data
      size: 1
scalings:
  - min: 1
    max: 1
